name: USA City Automation

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium firefox webkit

      - name: Run Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      # --- NEW STEP: UPLOAD SCREENSHOTS ---
      - name: Upload Screenshots for Debugging
        uses: actions/upload-artifact@v4
        if: always() # Yeh line ensure karti hai ki script fail bhi ho jaye toh bhi screenshot save ho
        with:
          name: debug-screenshots
          path: debug_screenshots/
          retention-days: 3 # 3 din tak GitHub par save rahenge

      - name: Save History
        run: |
          git config --global user.name "Github Bot"
          git config --global user.email "bot@github.com"
          git add history.txt
          git commit -m "Update history" || exit 0
          git push
